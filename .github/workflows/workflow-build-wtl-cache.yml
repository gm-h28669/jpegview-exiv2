name: Reusable - Build/Upload WTL cached
# TODO later test and lint
# TODO test building library dependencies (the prebuilt stuff)



# GH Action Reusable Workflow -- https://docs.github.com/en/actions/using-workflows/reusing-workflows
on:
  workflow_call:
    inputs:
      platform-arch:
        required: true
        type: string
      build-config:
        required: true
        type: string


# NOTE: This workflow may not be used in the future, but kept around for historical
# reasons (might need to use this cache routine in the future for other libs),
# or in case it is preferred to use this if the other breaks
#
# Currently this is used as the process for Debug releases


jobs:
  build:
    # we need VS 2022
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup MSBuild (VS2022)
      # https://github.com/marketplace/actions/setup-msbuild
      uses: microsoft/setup-msbuild@v1.1
      with:
        vs-version: '[17.0,18.0)'
        msbuild-architecture: ${{ inputs.platform-arch }}

    - name: Restore NuGet Packages
      run: nuget restore "src/JPEGView.sln" -Verbosity detailed -Force
      shell: cmd
 
    - name: Show content of packages folder (after NuGet restore)
      run: dir /s /a "D:\a\jpegview-exiv2\jpegview-exiv2\src\packages"
      shell: cmd

    - name: Extract and list NuGet package contents
      run: |
        echo === Extracting NuGet package ===
        cd "D:\a\jpegview-exiv2\jpegview-exiv2\src\packages\StoneSteps.Expat.VS2022.Static.2.6.3.1"
        powershell -Command "powershell -Command "Add-Type -AssemblyName 'System.IO.Compression'; Add-Type -AssemblyName System.IO.Compression.FileSystem; [System.IO.Compression.ZipFile]::ExtractToDirectory('StoneSteps.Expat.VS2022.Static.2.6.3.1.nupkg', 'extracted')"
        echo.
        echo === All files in extracted package ===
        dir /s /b extracted
      shell: cmd

    - uses: ./.github/actions/setup-wix

    - uses: ./.github/actions/wtl-cache

    - uses: ./.github/actions/build-solution
      with:
        platform-arch: ${{ inputs.platform-arch }}
        build-config: ${{ inputs.build-config }}

    - uses: ./.github/actions/upload-some-artifacts
      with:
        platform-arch: ${{ inputs.platform-arch }}
        build-config: ${{ inputs.build-config }}
